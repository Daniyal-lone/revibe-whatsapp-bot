services:
  - type: web
    name: revibe-salon-automation
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run migrate && npm run seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: revibe-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WHATSAPP_ENABLED
        value: false

databases:
  - name: revibe-postgres
    plan: starter
